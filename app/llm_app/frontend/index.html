<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course–Career Alignment Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --red:     #C0392B;
    --red-lt:  #FDECEA;
    --red-dk:  #922B21;
    --ink:     #1A1A2E;
    --ink2:    #4A4A6A;
    --ink3:    #8888A8;
    --bg:      #F7F6F2;
    --white:   #FFFFFF;
    --border:  #E2E0D8;
    --teal:    #0F6E72;
    --teal-lt: #E6F4F4;
    --green:   #166534;
    --green-lt:#DCFCE7;
    --amber:   #B7791F;
    --amber-lt:#FEF3C7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* Header */
  header {
    background: var(--ink); color: white;
    padding: 0 48px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .hd-left { display: flex; align-items: center; gap: 16px; }
  .logo { width: 32px; height: 32px; background: var(--red); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif; font-size: 18px; color: white; }
  .hd-title { font-size: 15px; font-weight: 500; letter-spacing: 0.02em; }
  .hd-sub   { font-size: 12px; color: #8888A8; margin-top: 1px; }
  .hd-badge { font-size: 11px; font-weight: 500; background: rgba(255,255,255,0.1);
    padding: 4px 10px; border-radius: 20px; color: #ccc; letter-spacing: 0.04em; }

  /* Layout */
  .container { max-width: 1000px; margin: 0 auto; padding: 40px 28px; }

  /* Input card */
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 36px 40px; margin-bottom: 28px; }

  .sec-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink3); margin-bottom: 18px; }

  /* Mode toggle */
  label.fl { font-size: 13px; font-weight: 500; color: var(--ink2); margin-bottom: 7px; display: block; }

  input[type="text"], input[type="url"], textarea {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: inherit; font-size: 14px; color: var(--ink);
    background: var(--bg); outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="url"]:focus, textarea:focus {
    border-color: var(--ink); background: white; }
  textarea { resize: vertical; min-height: 150px; }
  .hint { font-size: 12px; color: var(--ink3); margin-top: 6px; }

  .field-gap { margin-bottom: 16px; }

  /* Submit */
  .submit-row { display: flex; justify-content: flex-end; margin-top: 24px; }
  .btn {
    padding: 12px 32px; background: var(--red); color: white;
    border: none; border-radius: 10px; font-family: inherit;
    font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: background 0.15s;
  }
  .btn:hover { background: var(--red-dk); }
  .btn:disabled { background: var(--ink3); cursor: not-allowed; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%; display: none;
    animation: spin 0.7s linear infinite; }
  .btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .err { background: var(--red-lt); border: 1px solid #f5c6cb; border-radius: 10px;
    padding: 14px 18px; font-size: 14px; color: var(--red-dk);
    margin-bottom: 24px; display: none; }
  .err.on { display: block; }

  /* Results */
  #results { display: none; }
  #results.on { display: block; }

  .res-hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  .res-title { font-family: 'DM Serif Display', serif; font-size: 26px; }
  .res-meta  { font-size: 13px; color: var(--ink3); margin-top: 4px; }

  /* Job summary strip */
  .job-strip {
    background: var(--white); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 24px; margin-bottom: 24px;
    display: flex; gap: 16px; align-items: flex-start;
  }
  .job-strip-icon {
    width: 40px; height: 40px; min-width: 40px; background: var(--red-lt);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .job-title-text { font-weight: 600; font-size: 16px; margin-bottom: 2px; }
  .job-company     { font-size: 13px; color: var(--ink3); }

  /* View tabs */
  .view-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
  .vt { padding: 10px 20px; font-size: 14px; font-weight: 500; font-family: inherit;
    background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; color: var(--ink3); margin-bottom: -2px; transition: all 0.15s; }
  .vt.active { color: var(--ink); border-bottom-color: var(--red); }

  .vpanel { display: none; }
  .vpanel.active { display: block; }

  /* Course table */
  .tbl { width: 100%; border-collapse: collapse; background: var(--white);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .tbl th { background: var(--ink); color: white; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 16px; text-align: left; }
  .tbl td { padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-size: 14px; vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: var(--bg); }

  .rank { font-family: 'DM Serif Display', serif; font-size: 22px;
    color: var(--ink3); text-align: center; width: 44px; }
  .rank.gold { color: var(--red); }

  .c-name { font-weight: 600; font-size: 14px; margin-bottom: 1px; }

  .bar-wrap { display: flex; align-items: center; gap: 10px; }
  .bar { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--red); border-radius: 4px; transition: width 0.4s; }
  .bar-val { font-size: 12px; font-weight: 600; color: var(--ink2); width: 36px; }

  .mtag { display: inline-block; background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 7px; font-size: 11px; font-weight: 700;
    color: var(--ink2); font-family: monospace; }

  .n-pill { font-size: 12px; font-weight: 600; text-align: center;
    color: var(--ink2); }

  /* Module cards */
  .mod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .mod-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; transition: border-color 0.15s, box-shadow 0.15s; }
  .mod-card:hover { border-color: var(--ink); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .mod-code { font-family: monospace; font-size: 12px; font-weight: 700;
    color: var(--red); margin-bottom: 5px; }
  .mod-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; line-height: 1.3; }
  .mod-course { font-size: 11px; color: var(--ink3); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .mod-desc { font-size: 12px; color: var(--ink2); line-height: 1.65;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .mod-foot { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; }
  .sim-pill { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 10px; }
  .sim-h { background: var(--green-lt); color: var(--green); }
  .sim-m { background: var(--amber-lt); color: var(--amber); }
  .sim-l { background: var(--red-lt);   color: var(--red-dk); }
</style>
</head>
<body>

<header>
  <div class="hd-left">
    <div class="logo">M</div>
    <div>
      <div class="hd-title">Course–Career Alignment Tool</div>
      <div class="hd-sub">Ministry of Education · Skills Intelligence</div>
    </div>
  </div>
  <div class="hd-badge">MOE INTERNAL</div>
</header>

<div class="container">

  <div class="card">
    <div class="sec-label">Job Advertisement</div>

    <div id="panel-text">
      <div class="field-gap">
        <label class="fl">Job Title</label>
        <input type="text" id="title-in" placeholder="e.g. Data Scientist" oninput="clearErr()"/>
      </div>
      <label class="fl">Job Description</label>
      <textarea id="text-in"
        placeholder="Paste the full job description here..."
        oninput="clearErr()"></textarea>
    </div>

    <div class="submit-row">
      <button class="btn" id="submit-btn" onclick="handleSubmit()">
        <div class="spinner"></div>
        <span>Find Matching Courses</span>
      </button>
    </div>
  </div>

  <div class="err" id="err"></div>

  <!-- Results -->
  <div id="results">

    <div class="res-hdr">
      <div>
        <div class="res-title">Course Alignment Results</div>
        <div class="res-meta" id="res-meta"></div>
      </div>
    </div>

    <div class="job-strip" id="job-strip"></div>

    <div class="view-tabs">
      <button class="vt active" onclick="setView('courses')">Top 10 Courses</button>
      <button class="vt"        onclick="setView('modules')">Top Modules</button>
    </div>

    <div id="vpanel-courses" class="vpanel active">
      <table class="tbl">
        <thead>
          <tr>
            <th style="width:50px">#</th>
            <th style="width:80px">School</th>
            <th>Course</th>
            <th style="width:200px">Alignment Score</th>
            <th style="width:140px">Best Module</th>
            <th style="width:90px">Modules ≥ 45%</th>
          </tr>
        </thead>
        <tbody id="course-tbody"></tbody>
      </table>
    </div>

    <div id="vpanel-modules" class="vpanel">
      <div class="mod-grid" id="mod-grid"></div>
    </div>

  </div>
</div>

<script>
const API  = 'http://localhost:8000';
let view   = 'courses';

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) =>
    b.classList.toggle('active', (i === 0 && m === 'url') || (i === 1 && m === 'text')));
  document.getElementById('panel-url').classList.toggle('active',  m === 'url');
  document.getElementById('panel-text').classList.toggle('active', m === 'text');
}

function setView(v) {
  view = v;
  document.querySelectorAll('.vt').forEach((b, i) =>
    b.classList.toggle('active', (i === 0 && v === 'courses') || (i === 1 && v === 'modules')));
  document.getElementById('vpanel-courses').classList.toggle('active', v === 'courses');
  document.getElementById('vpanel-modules').classList.toggle('active', v === 'modules');
}

function clearErr() { document.getElementById('err').classList.remove('on'); }
function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.classList.add('on');
}
function setLoading(on) {
  const btn = document.getElementById('submit-btn');
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}

async function handleSubmit() {
  clearErr();
  setLoading(true);
  document.getElementById('results').classList.remove('on');

  try {
    const job_title = document.getElementById('title-in').value.trim();
    const job_text  = document.getElementById('text-in').value.trim();
    if (!job_text) { showErr('Please paste a job description.'); return; }
    const res = await fetch(`${API}/match/text`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_title, job_text, top_n: 10 }),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Server error'); }
    const data = await res.json();
    renderResults(data);
  } catch (e) {
    showErr(e.message || 'Something went wrong. Is the backend running?');
  } finally {
    setLoading(false);
  }
}

function renderResults({ job_info, top_courses, top_modules }) {
  // Meta
  document.getElementById('res-meta').textContent =
    `${top_courses.length} programmes · ${top_modules.length} modules ranked`;

  // Job strip
  const title   = job_info.title   || '(untitled)';
  const company = job_info.company || '';
  document.getElementById('job-strip').innerHTML = `
    <div class="job-strip-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C0392B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
      </svg>
    </div>
    <div>
      <div class="job-title-text">${esc(title)}</div>
      ${company ? `<div class="job-company">${esc(company)}</div>` : ''}
    </div>`;

  // Course table
  const tbody = document.getElementById('course-tbody');
  tbody.innerHTML = '';
  const schoolColors = {
    NUS:  { bg: '#E6F1FB', text: '#0C447C' },
    SMU:  { bg: '#E1F5EE', text: '#085041' },
    SUTD: { bg: '#FAEEDA', text: '#633806' },
  };

  function schoolBadge(school) {
    const s = school || 'NUS';
    const c = schoolColors[s] || { bg: '#F1EFE8', text: '#444441' };
    return `<span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;background:${c.bg};color:${c.text}">${esc(s)}</span>`;
  }

  top_courses.forEach((c, i) => {
    const rank  = i + 1;
    const pct   = Math.round((c.score || 0) * 100);
    const name  = c.course || '—';
    const school = c.school || 'NUS';
    const best  = c.best_module_code
      ? `<span class="mtag">${esc(c.best_module_code)}</span>` : '—';
    const nRel  = c.n_relevant_modules ?? '—';
    tbody.innerHTML += `
      <tr>
        <td class="rank ${rank <= 3 ? 'gold' : ''}">${rank}</td>
        <td style="text-align:center">${schoolBadge(school)}</td>
        <td><div class="c-name">${esc(name)}</div></td>
        <td>
          <div class="bar-wrap">
            <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="bar-val">${pct}%</div>
          </div>
        </td>
        <td>${best}</td>
        <td class="n-pill">${nRel}</td>
      </tr>`;
  });

  // Module cards
  const grid = document.getElementById('mod-grid');
  grid.innerHTML = '';
  top_modules.forEach(m => {
    const sim = m.similarity ?? 0;
    const pct = Math.round(sim * 100);
    const cls = sim >= 0.65 ? 'sim-h' : sim >= 0.45 ? 'sim-m' : 'sim-l';
    grid.innerHTML += `
      <div class="mod-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div class="mod-code">${esc(m.code || '')}</div>
          ${schoolBadge(m.school || 'NUS')}
        </div>
        <div class="mod-title">${esc(m.title || '')}</div>
        <div class="mod-course">${esc(m.course || '')}</div>
        <div class="mod-desc">${esc(m.description || '')}</div>
        <div class="mod-foot">
          <span class="sim-pill ${cls}">${pct}% match</span>
        </div>
      </div>`;
  });

  document.getElementById('results').classList.add('on');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
